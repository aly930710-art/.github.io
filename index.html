<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>62群专属 · 淘金币助力</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f5f5f5;font-family:system-ui;padding:15px;max-width:600px;margin:0 auto}
.header{background:#ff6600;color:#fff;text-align:center;padding:14px;border-radius:12px;margin-bottom:15px}
.header h2{font-size:18px}
.header p{font-size:12px;margin-top:4px}
.card{background:#fff;border-radius:16px;padding:20px;margin-bottom:15px}
textarea{width:100%;height:100px;border:1px solid #eee;border-radius:10px;padding:15px;font-size:15px;resize:none;margin-bottom:12px}
button{width:100%;background:#ff6600;color:#fff;border:none;padding:16px;border-radius:10px;font-size:16px}
.item{padding:14px 0;border-bottom:1px solid #f3f3f3}
.text{font-size:14px;line-height:1.5;margin-bottom:8px;word-break:break-all}
.info{display:flex;justify-content:space-between;font-size:12px;color:#999}
.copy{color:#ff6600}
.empty{text-align:center;color:#999;padding:30px}
.loading{text-align:center;padding:20px;color:#999}
</style>
</head>
<body>

<div class="header">
  <h2>62群专属 · 淘金币助力口令</h2>
  <p>每日0点自动清空 · 全员共享</p>
</div>

<div class="card">
  <textarea id="content" placeholder="粘贴你的淘金币助力口令"></textarea>
  <button onclick="submit()">提交分享</button>
</div>

<div id="list" class="card">
  <div class="loading">加载中...</div>
</div>

<script>
const channel = "taojinbi62";

function formatTime(t) {
  const d = new Date(t);
  const h = String(d.getHours()).padStart(2, '0');
  const m = String(d.getMinutes()).padStart(2, '0');
  return `${d.getMonth()+1}/${d.getDate()} ${h}:${m}`;
}

async function load() {
  const listEl = document.getElementById("list");
  try {
    const res = await fetch(`https://api.npoint.io/channel/${channel}/messages`);
    const arr = await res.json();
    if (!arr || arr.length === 0) {
      listEl.innerHTML = '<div class="empty">暂无助力口令</div>';
      return;
    }
    arr.sort((a, b) => new Date(b.time) - new Date(a.time));
    listEl.innerHTML = arr.map(i => `
      <div class="item">
        <div class="text">${i.text}</div>
        <div class="info">
          <span>${formatTime(i.time)}</span>
          <span class="copy" onclick="copy('${i.text.replace(/'/g, "\\'")}')">复制</span>
        </div>
      </div>
    `).join('');
  } catch (e) {
    listEl.innerHTML = '<div class="empty">加载失败，请刷新</div>';
  }
}

async function submit() {
  const t = document.getElementById("content").value.trim();
  if (!t) return alert("请输入口令");
  await fetch(`https://api.npoint.io/channel/${channel}/messages`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ text: t, time: new Date().toISOString() })
  });
  document.getElementById("content").value = "";
  load();
}

function copy(text) {
  const ta = document.createElement("textarea");
  ta.value = text;
  document.body.appendChild(ta);
  ta.select();
  document.execCommand("copy");
  document.body.removeChild(ta);
  alert("复制成功！");
}

load();
</script>
</body>
</html>
