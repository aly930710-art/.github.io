<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>淘金币助力共享</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui;background:#f6f6f6;padding:15px;max-width:600px;margin:0 auto}
    .card{background:#fff;border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
    .title{background:#ff6900;color:#fff;text-align:center;padding:12px;border-radius:12px;margin-bottom:15px}
    textarea{width:100%;height:90px;border:1px solid #eee;border-radius:10px;padding:12px;font-size:15px;margin-bottom:10px}
    .btn{width:100%;background:#ff6900;color:#fff;border:none;border-radius:10px;padding:15px;font-size:16px}
    .item{padding:12px 0;border-bottom:1px solid #f2f2f2}
    .text{font-size:15px;line-height:1.4;margin-bottom:8px;word-break:break-all}
    .meta{display:flex;justify-content:space-between;font-size:12px;color:#999}
    .copy{color:#ff6900;padding:4px 8px;background:#fff3e6;border-radius:6px}
  </style>
</head>
<body>
  <div class="title"><h3>淘金币助力口令共享</h3></div>
  <div class="card">
    <textarea id="content" placeholder="粘贴你的淘金币助力口令"></textarea>
    <button class="btn" onclick="submit()">提交分享</button>
  </div>
  <div id="list" class="card">加载中...</div>

  <script src="https://imgcache.qq.com/qcloud/tcbjs/1.3.6/tcb.js"></script>
  <script>
    // 填入你的腾讯云开发环境ID
    const envId = "你的环境ID";

    // 初始化
    tcb.init({ env: envId });
    const db = tcb.database();

    // 格式化时间
    function fmt(date) {
      const d = new Date(date);
      return `${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
    }

    // 复制
    function copy(s) {
      const el = document.createElement('textarea');
      el.value = s; document.body.appendChild(el);
      el.select(); document.execCommand('copy');
      document.body.removeChild(el);
      alert('复制成功');
    }

    // 加载列表
    async function load() {
      const now = new Date();
      const today = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
      const res = await db.collection('share')
        .where({ createTime: { $gte: today } })
        .orderBy('createTime', 'desc')
        .get();
      const list = res.data;
      if (!list.length) {
        document.getElementById('list').innerHTML = '<div style="text-align:center;color:#999;padding:30px">暂无助力口令</div>';
        return;
      }
      document.getElementById('list').innerHTML = list.map(i => `
        <div class="item">
          <div class="text">${i.text}</div>
          <div class="meta">
            <span>${fmt(i.createTime)}</span>
            <span class="copy" onclick="copy('${i.text.replace(/'/g,"\\'")}')">复制</span>
          </div>
        </div>
      `).join('');
    }

    // 提交
    async function submit() {
      const t = document.getElementById('content').value.trim();
      if (!t) return alert('请输入口令');
      await db.collection('share').add({
        text: t,
        createTime: Date.now()
      });
      document.getElementById('content').value = '';
      load();
    }

    load();
  </script>
</body>
</html>
